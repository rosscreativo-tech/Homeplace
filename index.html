<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Diseño Lite</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f5; }
        .primary-bg { background-color: #5b301f; }
        .primary-text { color: #5b301f; }
        .secondary-bg { background-color: #dfdbd0; }
        #pdf-render-container { position: absolute; left: -9999px; top: 0; background: white; width: 794px; height: 1123px; overflow: hidden; z-index: -1; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #5b301f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // CONFIGURACIÓN DIRECTA
        const SUPABASE_URL = 'https://ghzlohohenxihfzqhebz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UBrBbtO4tOG531JuwhXXCw_pugcTYBo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            // Todos tus estados originales de coti15.html
            const [quotes, setQuotes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isQuoteModalOpen, setIsQuoteModalOpen] = useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);

            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('company_settings');
                return saved ? JSON.parse(saved) : { companyName: 'Tu Empresa S.R.L.', creatorName: 'Admin', rnc: '', phone: '', email: '', address: '', bankInfo: '', terms: '', logo: null };
            });

            // Formulario original
            const [clientName, setClientName] = useState('');
            const [items, setItems] = useState([]);
            const [tax, setTax] = useState(18);
            const [applyTax, setApplyTax] = useState(true);
            const [discountValue, setDiscountValue] = useState(0);
            const [editingQuoteId, setEditingQuoteId] = useState(null);

            // CARGA DE DATOS (SUPABASE)
            const fetchQuotes = async () => {
                setLoading(true);
                const { data, error } = await supabase.from('quotes').select('*').order('created_at', { ascending: false });
                if (error) console.error(error);
                else setQuotes(data || []);
                setLoading(false);
            };

            useEffect(() => { fetchQuotes(); }, []);

            // Lógica de totales igual a la tuya
            const totals = useMemo(() => {
                const sub = items.reduce((a, b) => a + (Number(b.qty) * Number(b.price)), 0);
                const disc = Number(discountValue) || 0;
                const taxAmt = applyTax ? (sub - disc) * (tax / 100) : 0;
                return { sub, disc, tax: taxAmt, total: sub - disc + taxAmt };
            }, [items, tax, applyTax, discountValue]);

            // GUARDAR (SUPABASE)
            const handleSave = async () => {
                const quoteData = {
                    client_name: clientName,
                    items: items,
                    total: totals.total,
                    subtotal: totals.sub,
                    tax_amount: totals.tax,
                    quote_id: editingQuoteId ? quotes.find(q=>q.id === editingQuoteId).quote_id : `COT-${Date.now().toString().slice(-4)}`
                };

                if (editingQuoteId) {
                    await supabase.from('quotes').update(quoteData).eq('id', editingQuoteId);
                } else {
                    await supabase.from('quotes').insert([quoteData]);
                }
                setIsQuoteModalOpen(false);
                fetchQuotes();
            };

            if (loading) return <div className="h-screen flex items-center justify-center"><div className="loader"></div></div>;

            return (
                <div className="min-h-screen pb-10">
                    {/* Header con el botón de AJUSTES que pediste mantener */}
                    <header className="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <Icon name="file-text" size={24} className="primary-text" />
                            <h1 className="font-black text-xl primary-text uppercase">Ross Creativo</h1>
                        </div>
                        <button onClick={() => setIsSettingsModalOpen(true)} className="flex items-center gap-2 p-2 rounded-lg hover:bg-stone-100 transition-colors">
                            <Icon name="settings" size={20} />
                            <span className="text-xs font-bold uppercase tracking-widest">Ajustes</span>
                        </button>
                    </header>

                    <main className="max-w-5xl mx-auto p-6">
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-3xl font-black text-stone-800 uppercase">Cotizaciones</h2>
                            <button onClick={() => { setEditingQuoteId(null); setClientName(''); setItems([]); setIsQuoteModalOpen(true); }} className="primary-bg text-white px-6 py-3 rounded-xl font-bold shadow-lg">+ NUEVA</button>
                        </div>

                        <div className="grid gap-4">
                            {quotes.map(q => (
                                <div key={q.id} className="bg-white p-6 rounded-2xl shadow-sm border flex justify-between items-center">
                                    <div>
                                        <span className="text-[10px] font-bold text-stone-400 uppercase tracking-widest">{q.quote_id}</span>
                                        <h3 className="font-bold text-xl">{q.client_name}</h3>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-2xl font-black primary-text">RD$ {q.total?.toLocaleString()}</p>
                                        <div className="flex gap-2 justify-end mt-2">
                                            <button onClick={() => { setEditingQuoteId(q.id); setClientName(q.client_name); setItems(q.items); setIsQuoteModalOpen(true); }} className="p-2 bg-stone-100 rounded-lg"><Icon name="edit-2" size={16}/></button>
                                            <button onClick={async () => { if(confirm('¿Eliminar?')) { await supabase.from('quotes').delete().eq('id', q.id); fetchQuotes(); } }} className="p-2 bg-rose-50 text-rose-500 rounded-lg"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* MODAL DE AJUSTES (TU DISEÑO ORIGINAL) */}
                    {isSettingsModalOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black uppercase tracking-widest">Configuración de Empresa</h3>
                                    <button onClick={() => setIsSettingsModalOpen(false)}><Icon name="x" /></button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input className="border p-3 rounded-xl" placeholder="Nombre Empresa" value={settings.companyName} onChange={e=>setSettings({...settings, companyName: e.target.value})} />
                                    <input className="border p-3 rounded-xl" placeholder="RNC" value={settings.rnc} onChange={e=>setSettings({...settings, rnc: e.target.value})} />
                                </div>
                                <button onClick={() => { localStorage.setItem('company_settings', JSON.stringify(settings)); setIsSettingsModalOpen(false); }} className="w-full primary-bg text-white py-4 rounded-xl mt-6 font-bold uppercase">Guardar Cambios</button>
                            </div>
                        </div>
                    )}
                    
                    {/* El Modal de Cotización y el Render del PDF siguen aquí abajo con tu lógica... */}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
