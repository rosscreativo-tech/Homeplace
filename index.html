<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f0ede8; overscroll-behavior: none; }
        .pdf-font-serif { font-family: 'Playfair Display', serif; }
        .pdf-font-sans  { font-family: 'Inter', sans-serif; }
        #pdf-render-container { position:absolute; left:-9999px; top:0; background:white; width:794px; height:1123px; overflow:hidden; z-index:-1; }
        .loader { border:3px solid rgba(91,48,31,0.15); border-top:3px solid #5b301f; border-radius:50%; width:36px; height:36px; animation:spin .8s linear infinite; }
        .loader-white { border:2px solid rgba(255,255,255,0.3); border-top:2px solid white; border-radius:50%; width:16px; height:16px; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 0px); }
        @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
        .slide-up { animation:slideUp .28s cubic-bezier(0.32,0.72,0,1); }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
        .fade-in { animation:fadeIn .2s ease; }
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
        input:focus, textarea:focus, select:focus { outline:none; border-color:#5b301f !important; box-shadow:0 0 0 3px rgba(91,48,31,0.1); }
        @media (min-width: 768px) {
            .bottom-nav { order: -1; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const SUPABASE_URL  = "https://ghzlohohenxihfzqhebz.supabase.co";
const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoemxvaG9oZW54aWhmenFoZWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjEwOTIsImV4cCI6MjA5MDQ5NzA5Mn0.rv4R4qDmPQia44NVVHQHaHokiHsWYoN4BOoVcsVzwCg"; // ⚠️ Reemplaza con tu anon key (eyJ...) desde Supabase Dashboard → Settings → API
const ADMIN_EMAIL   = "creativobyross@gmail.com";

const Icon = ({ name, size=18, className="" }) => {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
    return <i data-lucide={name} className={className} style={{width:size,height:size,display:'inline-block'}}></i>;
};

/* ── LOGIN ────────────────────────────────────────────── */
function LoginScreen({ onLogin }) {
    const [email, setEmail]       = useState('');
    const [password, setPassword] = useState('');
    const [loading, setLoading]   = useState(false);
    const [error, setError]       = useState('');
    const [showPw, setShowPw]     = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data, error: err } = await client.auth.signInWithPassword({ email, password });
            if (err) throw err;
            if (!data?.user) throw new Error('Sin usuario');
            const isAdmin = data.user.email === ADMIN_EMAIL;
            onLogin(client, data.user, isAdmin, isAdmin ? 'Admin' : 'KTorres');
        } catch(err) {
            console.error('Login error:', err);
            setError('Correo o contraseña incorrectos');
        }
        finally { setLoading(false); }
    };

    return (
        <div className="min-h-screen bg-[#5b301f] flex flex-col items-center justify-center p-6 relative overflow-hidden">
            <div className="absolute -top-24 -right-24 w-64 h-64 rounded-full bg-white/5"></div>
            <div className="absolute -bottom-32 -left-16 w-80 h-80 rounded-full bg-white/5"></div>
            <div className="absolute top-1/3 -left-12 w-40 h-40 rounded-full bg-[#dfdbd0]/10"></div>
            <div className="w-full max-w-sm relative z-10 fade-in">
                <div className="text-center mb-10">
                    <div className="w-20 h-20 rounded-3xl bg-[#dfdbd0] flex items-center justify-center mx-auto mb-5 shadow-2xl">
                        <Icon name="file-text" size={36} className="text-[#5b301f]" />
                    </div>
                    <h1 className="text-3xl font-black text-white tracking-tight">Cotizador</h1>
                    <p className="text-white/50 text-sm mt-1 font-medium">Inicia sesión para continuar</p>
                </div>
                <div className="bg-white rounded-3xl p-7 shadow-2xl">
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-widest mb-2">Correo</label>
                            <div className="relative">
                                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400"><Icon name="mail" size={16}/></span>
                                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="correo@ejemplo.com"
                                    className="w-full pl-10 pr-4 py-3 border border-stone-200 rounded-2xl text-sm bg-stone-50 transition-all"/>
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-widest mb-2">Contraseña</label>
                            <div className="relative">
                                <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400"><Icon name="lock" size={16}/></span>
                                <input type={showPw?'text':'password'} required value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"
                                    className="w-full pl-10 pr-11 py-3 border border-stone-200 rounded-2xl text-sm bg-stone-50 transition-all"/>
                                <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3.5 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600">
                                    <Icon name={showPw?'eye-off':'eye'} size={16}/>
                                </button>
                            </div>
                        </div>
                        {error && (
                            <div className="bg-rose-50 border border-rose-200 text-rose-700 text-xs font-semibold px-4 py-3 rounded-2xl flex items-center gap-2">
                                <Icon name="alert-circle" size={14}/> {error}
                            </div>
                        )}
                        <button type="submit" disabled={loading}
                            className="w-full bg-[#5b301f] text-white py-3.5 rounded-2xl font-black text-sm shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2 mt-2 disabled:opacity-70">
                            {loading ? <><div className="loader-white"></div>Entrando...</> : <><Icon name="log-in" size={16}/>Iniciar Sesión</>}
                        </button>
                    </form>
                </div>
                <p className="text-center text-white/30 text-xs mt-6 font-medium">Desarrollado por Ross Creativo 2026</p>
            </div>
        </div>
    );
}

/* ── MAIN APP ─────────────────────────────────────────── */
function MainApp({ supabase, user, isAdmin, displayName, onLogout }) {
    const [activeTab, setActiveTab] = useState('home');
    const [quotes, setQuotes]       = useState([]);
    const [loading, setLoading]     = useState(true);
    const [toast, setToast]         = useState(null);

    const [isQuoteModalOpen, setIsQuoteModalOpen]       = useState(false);
    const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
    const [isGeneratingPDF, setIsGeneratingPDF]         = useState(false);
    const [isPDFPreviewOpen, setIsPDFPreviewOpen]       = useState(false);
    const [pdfPreviewQuote, setPdfPreviewQuote]         = useState(null);
    const [pdfPreviewDataUrl, setPdfPreviewDataUrl]     = useState(null);
    const [uploadingLogo, setUploadingLogo]             = useState(false);
    const [savingSettings, setSavingSettings]           = useState(false);
    const [filterStatus, setFilterStatus]               = useState('Todos');

    const defaultSettings = {
        companyName:'Tu Empresa S.R.L.', address:'Calle Principal 123, Ensanche, Ciudad',
        phone:'+1 809 123 4567', email:'contacto@tuempresa.com', rnc:'132-45678-9',
        bankInfo:'Banco Popular\nCuenta Corriente: 123456789\nA nombre de: Tu Empresa',
        terms:'Los precios expresados en este documento tienen una vigencia de 15 días. El pago debe realizarse 50% al iniciar y 50% contra entrega.',
        creatorName:'Juan Pérez', logo:null
    };
    const [settings, setSettings] = useState(() => {
        const s = localStorage.getItem('company_settings');
        return s ? { ...defaultSettings, ...JSON.parse(s) } : defaultSettings;
    });

    const [clientName, setClientName]       = useState('');
    const [clientPhone, setClientPhone]     = useState('');
    const [clientAddress, setClientAddress] = useState('');
    const [dueDate, setDueDate]             = useState('');
    const [observations, setObservations]   = useState('');
    const [items, setItems]                 = useState([]);
    const [newItem, setNewItem]             = useState({ desc:'', qty:1, price:'' });
    const [tax, setTax]                     = useState(18);
    const [applyTax, setApplyTax]           = useState(true);
    const [discountType, setDiscountType]   = useState('percentage');
    const [discountValue, setDiscountValue] = useState(0);
    const [editingQuoteId, setEditingQuoteId] = useState(null);
    const [currentQuotePDF, setCurrentQuotePDF] = useState(null);

    const showToast = (msg, type='success') => {
        setToast({msg,type}); setTimeout(()=>setToast(null), 2800);
    };

    /* Load */
    useEffect(() => {
        (async () => {
            try {
                const { data:sd } = await supabase.from('settings').select('*').eq('id',1).single();
                if (sd?.data) { setSettings({...defaultSettings,...sd.data}); localStorage.setItem('company_settings',JSON.stringify(sd.data)); }
            } catch(e){ console.warn('Settings load error:', e); }
            try {
                const { data:qd, error } = await supabase.from('quotes').select('*').order('created_at',{ascending:false});
                if (error) throw error;
                setQuotes(qd||[]);
            } catch(e){ console.warn('Quotes load error:', e); setQuotes([]); }
            finally { setLoading(false); }
        })();
    }, []);

    /* Realtime */
    useEffect(() => {
        const ch = supabase.channel('quotes-rt')
            .on('postgres_changes',{event:'*',schema:'public',table:'quotes'}, async ()=>{
                const {data} = await supabase.from('quotes').select('*').order('created_at',{ascending:false});
                setQuotes(data||[]);
            }).subscribe();
        return () => supabase.removeChannel(ch);
    }, [supabase]);

    useEffect(()=>{
        if (isQuoteModalOpen && !editingQuoteId && !dueDate) {
            const d=new Date(); d.setDate(d.getDate()+15); setDueDate(d.toISOString().split('T')[0]);
        }
    },[isQuoteModalOpen]);

    const stats = useMemo(()=>{
        const now=new Date(); let totalCotizado=0,aceptadas=0,vencimientos=0;
        quotes.forEach(q=>{
            const d=new Date(q.created_at||Date.now());
            if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()) totalCotizado+=q.total||0;
            if(q.status==='Aceptada'||q.status==='Facturada') aceptadas++;
            if(q.due_date&&q.status!=='Aceptada'&&q.status!=='Facturada'){
                const diff=Math.ceil((new Date(q.due_date)-now)/86400000);
                if(diff>=0&&diff<=7) vencimientos++;
            }
        });
        return { totalCotizado, tasaCierre: quotes.length>0?((aceptadas/quotes.length)*100).toFixed(0):0, vencimientos };
    },[quotes]);

    const totals = useMemo(()=>{
        const sub=items.reduce((a,b)=>a+Number(b.qty)*Number(b.price),0);
        const discAmt=Number(discountValue)>0?(discountType==='percentage'?sub*Number(discountValue)/100:Number(discountValue)):0;
        const post=Math.max(0,sub-discAmt);
        const taxAmt=applyTax?post*Number(tax)/100:0;
        return {sub,discAmt,post,taxAmt,total:post+taxAmt};
    },[items,tax,applyTax,discountType,discountValue]);

    const filteredQuotes = useMemo(()=>filterStatus==='Todos'?quotes:quotes.filter(q=>(q.status||'Pendiente')===filterStatus),[quotes,filterStatus]);

    const handleSaveSettings = async () => {
        setSavingSettings(true);
        localStorage.setItem('company_settings',JSON.stringify(settings));
        try {
            const isUrl=settings.logo?.startsWith('http');
            const data=isUrl?settings:(({logo,...r})=>r)(settings);
            const {error}=await supabase.from('settings').upsert({id:1,data},{onConflict:'id'});
            if(error) throw error;
            showToast('Ajustes guardados ✓'); setIsSettingsModalOpen(false);
        } catch { showToast('Error al guardar','error'); } finally { setSavingSettings(false); }
    };

    const handleLogoUpload = async (e) => {
        const file=e.target.files[0]; if(!file) return;
        setUploadingLogo(true);
        try {
            const ext=file.name.split('.').pop();
            const filename=`logo-${Date.now()}.${ext}`;
            const {error:upErr}=await supabase.storage.from('logos').upload(filename,file,{upsert:true,contentType:file.type});
            if(upErr) throw upErr;
            const {data:urlData}=supabase.storage.from('logos').getPublicUrl(filename);
            setSettings(p=>({...p,logo:urlData.publicUrl})); showToast('Logo subido ✓');
        } catch {
            showToast('Error al subir logo','error');
            const r=new FileReader(); r.onloadend=()=>setSettings(p=>({...p,logo:r.result})); r.readAsDataURL(file);
        } finally { setUploadingLogo(false); }
    };

    const generateQuoteNumber = async () => {
        try {
            const year=new Date().getFullYear();
            const {data}=await supabase.from('quotes').select('quote_id').ilike('quote_id',`COT-${year}-%`);
            const nums=(data||[]).map(r=>parseInt((r.quote_id||'').split('-')[2]||'0',10)).filter(n=>!isNaN(n));
            return `COT-${year}-${String((nums.length>0?Math.max(...nums):0)+1).padStart(4,'0')}`;
        } catch { return `COT-${new Date().getFullYear()}-${String(quotes.length+1).padStart(4,'0')}`; }
    };

    const handleSaveQuote = async () => {
        if(!clientName||items.length===0){ showToast('Completa el cliente y al menos un producto','error'); return; }
        const qd={
            client_name:clientName, client_phone:clientPhone, client_address:clientAddress,
            due_date:dueDate||null, observations, items:JSON.stringify(items),
            tax_rate:tax, apply_tax:applyTax, discount_type:discountType,
            discount_value:discountValue, discount_amount:totals.discAmt,
            subtotal:totals.sub, tax_amount:totals.taxAmt, total:totals.total,
            status:editingQuoteId?quotes.find(q=>q.id===editingQuoteId)?.status||'Pendiente':'Pendiente'
        };
        try {
            if(editingQuoteId){ const {error}=await supabase.from('quotes').update(qd).eq('id',editingQuoteId); if(error) throw error; }
            else { qd.quote_id=await generateQuoteNumber(); qd.date_str=new Date().toLocaleDateString('es-DO'); const {error}=await supabase.from('quotes').insert([qd]); if(error) throw error; }
            const {data}=await supabase.from('quotes').select('*').order('created_at',{ascending:false});
            setQuotes(data||[]); showToast(editingQuoteId?'Cotización actualizada ✓':'Cotización creada ✓');
            setIsQuoteModalOpen(false); resetForm();
        } catch(err){ showToast('Error: '+err.message,'error'); }
    };

    const handleEditQuote = (q) => {
        setClientName(q.client_name||''); setClientPhone(q.client_phone||''); setClientAddress(q.client_address||'');
        setDueDate(q.due_date||''); setObservations(q.observations||'');
        setItems(typeof q.items==='string'?JSON.parse(q.items):q.items||[]);
        setNewItem({desc:'',qty:1,price:''}); setTax(q.tax_rate??18); setApplyTax(q.apply_tax??true);
        setDiscountType(q.discount_type||'percentage'); setDiscountValue(q.discount_value||0);
        setEditingQuoteId(q.id); setIsQuoteModalOpen(true);
    };

    const handleDuplicateQuote = (q) => {
        handleEditQuote(q); setEditingQuoteId(null);
        const d=new Date(); d.setDate(d.getDate()+15); setDueDate(d.toISOString().split('T')[0]);
    };

    const handleUpdateStatus = async (id, s) => {
        const {error}=await supabase.from('quotes').update({status:s}).eq('id',id);
        if(!error) setQuotes(p=>p.map(q=>q.id===id?{...q,status:s}:q));
    };

    const handleDeleteQuote = async (id) => {
        if(!confirm('¿Eliminar esta cotización?')) return;
        await supabase.from('quotes').delete().eq('id',id);
        setQuotes(p=>p.filter(q=>q.id!==id)); showToast('Eliminada');
    };

    const resetForm = () => {
        setClientName('');setClientPhone('');setClientAddress('');setObservations('');setDueDate('');
        setItems([]);setNewItem({desc:'',qty:1,price:''});setTax(18);setApplyTax(true);
        setDiscountType('percentage');setDiscountValue(0);setEditingQuoteId(null);
    };

    const normalizeQ = (r) => ({
        ...r, clientName:r.client_name||'', clientPhone:r.client_phone||'', clientAddress:r.client_address||'',
        dueDate:r.due_date||'', quoteId:r.quote_id||'',
        dateStr:r.date_str||new Date(r.created_at||Date.now()).toLocaleDateString('es-DO'),
        items:typeof r.items==='string'?JSON.parse(r.items):r.items||[],
        taxRate:r.tax_rate??18, applyTax:r.apply_tax??true,
        discountAmount:r.discount_amount||0, taxAmount:r.tax_amount||0,
    });

    const processPDF = async (raw, action) => {
        const quote=normalizeQ(raw); setIsGeneratingPDF(true); setCurrentQuotePDF(quote);
        setTimeout(async()=>{
            try {
                const el=document.getElementById('pdf-template');
                const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
                const img=canvas.toDataURL('image/jpeg',1.0);
                if(action==='preview'){ setPdfPreviewDataUrl(img); setPdfPreviewQuote(quote); setIsPDFPreviewOpen(true); setIsGeneratingPDF(false); setCurrentQuotePDF(null); return; }
                const pdf=new window.jspdf.jsPDF('p','mm','a4');
                const w=pdf.internal.pageSize.getWidth();
                pdf.addImage(img,'JPEG',0,0,w,canvas.height*w/canvas.width);
                const fn=`${quote.quoteId}_${quote.clientName.replace(/\s+/g,'_')}.pdf`;
                if(action==='download') pdf.save(fn);
                else { const blob=pdf.output('blob'); const f=new File([blob],fn,{type:'application/pdf'});
                    if(navigator.canShare?.({files:[f]})) await navigator.share({files:[f],title:`Cotización ${quote.quoteId}`}); else pdf.save(fn); }
            } catch { showToast('Error generando PDF','error'); }
            finally { setIsGeneratingPDF(false); setCurrentQuotePDF(null); }
        },800);
    };

    const downloadFromPreview = () => {
        if(!pdfPreviewDataUrl||!pdfPreviewQuote) return;
        const pdf=new window.jspdf.jsPDF('p','mm','a4'); const img=new Image(); img.src=pdfPreviewDataUrl;
        img.onload=()=>{ const w=pdf.internal.pageSize.getWidth(); pdf.addImage(pdfPreviewDataUrl,'JPEG',0,0,w,img.height*w/img.width); pdf.save(`${pdfPreviewQuote.quoteId}_${pdfPreviewQuote.clientName.replace(/\s+/g,'_')}.pdf`); };
    };

    const shareFromPreview = async () => {
        if(!pdfPreviewDataUrl||!pdfPreviewQuote) return;
        const pdf=new window.jspdf.jsPDF('p','mm','a4'); const img=new Image(); img.src=pdfPreviewDataUrl;
        img.onload=async()=>{
            const w=pdf.internal.pageSize.getWidth(); pdf.addImage(pdfPreviewDataUrl,'JPEG',0,0,w,img.height*w/img.width);
            const fn=`${pdfPreviewQuote.quoteId}_${pdfPreviewQuote.clientName.replace(/\s+/g,'_')}.pdf`;
            const blob=pdf.output('blob'); const f=new File([blob],fn,{type:'application/pdf'});
            if(navigator.canShare?.({files:[f]})) await navigator.share({files:[f],title:`Cotización ${pdfPreviewQuote.quoteId}`}); else pdf.save(fn);
        };
    };

    const SC = {
        Pendiente:{ bg:'bg-amber-100 text-amber-700 border-amber-200' },
        Aceptada: { bg:'bg-emerald-100 text-emerald-700 border-emerald-200' },
        Facturada:{ bg:'bg-blue-100 text-blue-700 border-blue-200' },
        Rechazada:{ bg:'bg-rose-100 text-rose-700 border-rose-200' },
    };

    if(loading) return (
        <div className="h-screen flex items-center justify-center flex-col gap-4 bg-[#f0ede8]">
            <div className="loader"></div>
            <span className="font-bold text-xs uppercase tracking-widest text-[#5b301f]">Cargando...</span>
        </div>
    );

    return (
        <div className="h-screen flex flex-col bg-[#f0ede8] relative overflow-hidden md:flex-row">

            {/* Toast */}
            {toast && (
                <div className={`fixed top-5 left-1/2 -translate-x-1/2 z-[9999] px-5 py-3 rounded-2xl shadow-2xl text-white text-sm font-bold flex items-center gap-2 fade-in ${toast.type==='error'?'bg-rose-600':'bg-[#5b301f]'}`}>
                    <Icon name={toast.type==='error'?'x-circle':'check-circle'} size={16}/> {toast.msg}
                </div>
            )}

            {/* PDF generating */}
            {isGeneratingPDF && (
                <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-sm z-[9998] flex flex-col items-center justify-center text-white">
                    <div className="loader mb-4" style={{borderColor:'rgba(255,255,255,0.2)',borderTopColor:'white'}}></div>
                    <p className="font-bold text-sm">Generando PDF...</p>
                </div>
            )}

            {/* ── CONTENT AREA ── */}
            <div className="flex-1 flex flex-col overflow-hidden md:h-full">

            {/* ── HOME TAB ── */}
            {activeTab==='home' && (
                <div className="flex-1 overflow-y-auto no-scrollbar pb-28 md:pb-8">
                    <div className="bg-[#5b301f] px-6 pt-14 pb-8 relative overflow-hidden md:pt-10">
                        <div className="absolute -top-8 -right-8 w-40 h-40 rounded-full bg-white/5"></div>
                        <div className="absolute bottom-0 right-12 w-24 h-24 rounded-full bg-[#dfdbd0]/10"></div>
                        {settings.logo && <img src={settings.logo} alt="" aria-hidden="true" className="absolute right-0 bottom-0 h-28 w-auto object-contain opacity-10 pointer-events-none select-none"/>}
                        <div className="flex justify-between items-start relative z-10 mb-6">
                            <div>
                                <p className="text-white/60 text-sm font-medium">Bienvenido,</p>
                                <h1 className="text-white text-2xl font-black tracking-tight">{displayName}</h1>
                                <p className="text-[#dfdbd0]/70 text-xs mt-0.5 font-medium">{settings.companyName}</p>
                            </div>
                        <div className="flex items-center gap-2">
                                {settings.logo && <img src={settings.logo} alt="logo" className="h-10 w-auto object-contain rounded-xl"/>}
                                {isAdmin && (
                                    <button onClick={()=>setIsSettingsModalOpen(true)} className="flex items-center gap-1.5 h-10 px-3 rounded-2xl bg-white/15 text-white hover:bg-white/25 transition-all">
                                        <Icon name="settings" size={16}/>
                                        <span className="text-xs font-bold">Ajustes</span>
                                    </button>
                                )}
                                <button onClick={onLogout} className="flex items-center gap-1.5 h-10 px-3 rounded-2xl bg-white/10 text-white/70 hover:bg-white/20 transition-all md:hidden">
                                    <Icon name="log-out" size={16}/>
                                    <span className="text-xs font-bold">Salir</span>
                                </button>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 gap-3 relative z-10">
                            {[
                                {label:'Este mes', value:`RD$ ${(stats.totalCotizado/1000).toFixed(1)}k`, icon:'trending-up'},
                                {label:'Tasa cierre', value:`${stats.tasaCierre}%`, icon:'pie-chart'},
                                {label:'Vencen pronto', value:stats.vencimientos, icon:'clock'},
                            ].map((s,i)=>(
                                <div key={i} className="bg-white/10 rounded-2xl p-3 backdrop-blur-sm">
                                    <Icon name={s.icon} size={16} className="text-[#dfdbd0] mb-2"/>
                                    <div className="text-white font-black text-xl leading-none">{s.value}</div>
                                    <div className="text-white/50 text-[10px] font-medium mt-1">{s.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="px-5 mt-6">
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-stone-800 font-black text-lg">Recientes</h2>
                            <button onClick={()=>setActiveTab('quotes')} className="text-[#5b301f] text-xs font-bold flex items-center gap-1">
                                Ver todas <Icon name="chevron-right" size={14}/>
                            </button>
                        </div>
                        {quotes.length===0 ? (
                            <div className="bg-white rounded-3xl p-10 text-center shadow-sm border border-stone-100">
                                <Icon name="file-text" size={32} className="text-stone-200 mx-auto mb-3"/>
                                <p className="text-stone-400 text-xs font-bold uppercase tracking-widest">Sin cotizaciones aún</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {quotes.slice(0,4).map((q,i)=>{
                            const sc=SC[q.status||'Pendiente'];
                            return (
                                <div key={q.id||i} onClick={()=>handleEditQuote(q)} className="bg-white rounded-2xl p-4 shadow-sm border border-stone-100 flex items-center gap-3 cursor-pointer hover:shadow-md hover:border-[#5b301f]/20 transition-all active:scale-[0.98]">
                                    <div className="w-11 h-11 rounded-2xl bg-[#f0ede8] flex items-center justify-center flex-shrink-0">
                                        <Icon name="user" size={18} className="text-[#5b301f]"/>
                                    </div>
                                    <div className="flex-grow min-w-0">
                                        <div className="font-bold text-stone-800 text-sm truncate">{q.client_name}</div>
                                        <div className="text-stone-400 text-xs font-medium">{q.quote_id} · {q.date_str}</div>
                                    </div>
                                    <div className="text-right flex-shrink-0">
                                        <div className="font-black text-[#5b301f] text-sm">RD$ {(q.total||0).toLocaleString('en-US',{minimumFractionDigits:0})}</div>
                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${sc.bg}`}>{q.status||'Pendiente'}</span>
                                    </div>
                                </div>
                            );
                        })}
                        </div>
                        )}
                    </div>
                </div>
            )}

            {/* ── QUOTES TAB ── */}
            {activeTab==='quotes' && (
                <div className="flex-1 overflow-y-auto no-scrollbar pb-28 md:pb-8">
                    <div className="bg-[#5b301f] px-6 pt-14 pb-5 md:pt-10">
                        <h2 className="text-white font-black text-2xl">Cotizaciones</h2>
                        <p className="text-white/50 text-xs font-medium mt-1">{quotes.length} en total</p>
                    </div>
                    <div className="px-5 py-4 flex gap-2 overflow-x-auto no-scrollbar">
                        {['Todos','Pendiente','Aceptada','Facturada','Rechazada'].map(s=>(
                            <button key={s} onClick={()=>setFilterStatus(s)}
                                className={`flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold border transition-all ${filterStatus===s?'bg-[#5b301f] text-white border-[#5b301f] shadow-md':'bg-white text-stone-500 border-stone-200'}`}>
                                {s}
                            </button>
                        ))}
                    </div>
                    <div className="px-5 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                        {filteredQuotes.length===0 ? (
                            <div className="bg-white rounded-3xl p-12 text-center shadow-sm border border-stone-100">
                                <Icon name="search" size={32} className="text-stone-200 mx-auto mb-3"/>
                                <p className="text-stone-400 text-xs font-bold uppercase tracking-widest">Sin resultados</p>
                            </div>
                        ) : filteredQuotes.map((q,idx)=>{
                            const due=q.due_date;
                            const expired=due&&new Date(due)<new Date(new Date().setHours(0,0,0,0));
                            const sc=SC[q.status||'Pendiente'];
                            return (
                                <div key={q.id||idx} className={`bg-white rounded-3xl shadow-sm border overflow-hidden ${expired&&q.status==='Pendiente'?'border-rose-200':'border-stone-100'}`}>
                                    {expired&&q.status==='Pendiente'&&<div className="bg-rose-500 text-white text-[10px] font-black text-center py-1 uppercase tracking-widest">Vencida</div>}
                                    <div className="p-4">
                                        <div className="flex items-start justify-between gap-3 mb-3">
                                            <div className="flex items-center gap-3 min-w-0">
                                                <div className="w-10 h-10 rounded-2xl bg-[#f0ede8] flex items-center justify-center flex-shrink-0">
                                                    <Icon name="user" size={16} className="text-[#5b301f]"/>
                                                </div>
                                                <div className="min-w-0">
                                                    <div className="font-bold text-stone-800 truncate">{q.client_name}</div>
                                                    <div className="text-stone-400 text-xs">{q.quote_id} · {q.date_str}</div>
                                                </div>
                                            </div>
                                            <div className="font-black text-[#5b301f] text-base flex-shrink-0">RD$ {(q.total||0).toLocaleString('en-US',{minimumFractionDigits:0})}</div>
                                        </div>
                                        <div className="flex items-center gap-2 mb-3 flex-wrap">
                                            <select value={q.status||'Pendiente'} onChange={e=>handleUpdateStatus(q.id,e.target.value)}
                                                className={`text-[10px] font-bold px-3 py-1.5 rounded-full border outline-none cursor-pointer ${sc.bg}`}>
                                                {Object.keys(SC).map(s=><option key={s}>{s}</option>)}
                                            </select>
                                            {due&&<span className={`text-[10px] font-bold px-2 py-1 rounded-full ${expired&&q.status==='Pendiente'?'bg-rose-100 text-rose-600':'bg-stone-100 text-stone-500'}`}>Vence: {new Date(due).toLocaleDateString('es-DO')}</span>}
                                        </div>
                                        <div className="flex gap-2 pt-3 border-t border-stone-100">
                                            <button onClick={()=>processPDF(q,'preview')} className="flex-1 flex items-center justify-center gap-1.5 py-2.5 bg-[#f0ede8] text-[#5b301f] rounded-2xl text-xs font-bold hover:brightness-95 transition-all">
                                                <Icon name="eye" size={14}/> PDF
                                            </button>
                                            <button onClick={()=>processPDF(q,'share')} className="flex-1 flex items-center justify-center gap-1.5 py-2.5 bg-emerald-50 text-emerald-700 rounded-2xl text-xs font-bold hover:bg-emerald-100 transition-all">
                                                <Icon name="share-2" size={14}/> Compartir
                                            </button>
                                            <button onClick={()=>handleDuplicateQuote(q)} className="w-10 flex items-center justify-center py-2.5 bg-purple-50 text-purple-600 rounded-2xl hover:bg-purple-100">
                                                <Icon name="copy" size={14}/>
                                            </button>
                                            <button onClick={()=>handleEditQuote(q)} className="w-10 flex items-center justify-center py-2.5 bg-blue-50 text-blue-600 rounded-2xl hover:bg-blue-100">
                                                <Icon name="edit-2" size={14}/>
                                            </button>
                                            <button onClick={()=>handleDeleteQuote(q.id)} className="w-10 flex items-center justify-center py-2.5 bg-stone-50 text-stone-400 rounded-2xl hover:bg-rose-50 hover:text-rose-600">
                                                <Icon name="trash-2" size={14}/>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}

            </div>{/* end content area */}

            {/* ── BOTTOM NAV / SIDEBAR ── */}
            <div className="bottom-nav bg-white border-t border-stone-100 flex items-center px-4 pt-3 pb-2 gap-1 shadow-2xl flex-shrink-0 relative z-40 order-last
                md:order-first md:flex-col md:justify-start md:items-stretch md:border-t-0 md:border-r md:border-stone-100 md:w-56 md:h-full md:px-3 md:pt-8 md:pb-6 md:gap-1">
                
                {/* Logo/Brand - only on desktop */}
                <div className="hidden md:block px-3 mb-8">
                    <div className="flex items-center gap-2.5">
                        <div className="w-9 h-9 rounded-2xl bg-[#5b301f] flex items-center justify-center flex-shrink-0">
                            <Icon name="file-text" size={18} className="text-white"/>
                        </div>
                        <div>
                            <div className="font-black text-stone-800 text-sm leading-none">Cotizador</div>
                            <div className="text-stone-400 text-[10px] font-medium mt-0.5">{settings.companyName}</div>
                        </div>
                    </div>
                </div>

                <button onClick={()=>setActiveTab('home')} className={`flex-1 flex flex-col items-center gap-1 py-1 rounded-2xl transition-all
                    md:flex-none md:flex-row md:gap-3 md:px-4 md:py-3 md:rounded-2xl md:items-center md:justify-start
                    ${activeTab==='home'?'text-[#5b301f] md:bg-[#5b301f]/10':'text-stone-400 md:hover:bg-stone-100'}`}>
                    <Icon name="home" size={20}/>
                    <span className="text-[10px] font-bold md:text-sm md:font-semibold">Inicio</span>
                    {activeTab==='home'&&<div className="w-1 h-1 rounded-full bg-[#5b301f] md:hidden"></div>}
                </button>

                {/* FAB → New Quote button on desktop */}
                <button onClick={()=>{setActiveTab('quotes');setIsQuoteModalOpen(true);}}
                    className="w-14 h-14 rounded-full bg-[#5b301f] text-white flex items-center justify-center shadow-2xl hover:brightness-110 transition-all -mt-7 flex-shrink-0 mx-2
                    md:w-auto md:h-auto md:rounded-2xl md:mt-0 md:mx-0 md:px-4 md:py-3 md:justify-start md:gap-3 md:shadow-lg">
                    <Icon name="plus" size={22}/>
                    <span className="hidden md:inline font-bold text-sm">Nueva Cotización</span>
                </button>

                <button onClick={()=>setActiveTab('quotes')} className={`flex-1 flex flex-col items-center gap-1 py-1 rounded-2xl transition-all
                    md:flex-none md:flex-row md:gap-3 md:px-4 md:py-3 md:rounded-2xl md:items-center md:justify-start
                    ${activeTab==='quotes'?'text-[#5b301f] md:bg-[#5b301f]/10':'text-stone-400 md:hover:bg-stone-100'}`}>
                    <Icon name="file-text" size={20}/>
                    <span className="text-[10px] font-bold md:text-sm md:font-semibold">Cotizaciones</span>
                    {activeTab==='quotes'&&<div className="w-1 h-1 rounded-full bg-[#5b301f] md:hidden"></div>}
                </button>

                {/* Logout - only on desktop */}
                <div className="hidden md:block mt-auto">
                    <button onClick={onLogout} className="flex items-center gap-3 px-4 py-3 rounded-2xl text-stone-400 hover:bg-stone-100 hover:text-stone-600 transition-all w-full">
                        <Icon name="log-out" size={18}/>
                        <span className="text-sm font-semibold">Salir</span>
                    </button>
                </div>
            </div>

            {/* ── MODAL COTIZACIÓN ── */}
            {isQuoteModalOpen && (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-end justify-center md:items-center">
                    <div className="bg-[#f0ede8] rounded-t-[2rem] shadow-2xl w-full max-w-lg flex flex-col h-[96vh] overflow-hidden slide-up md:rounded-[2rem] md:h-[90vh] md:max-w-2xl">
                        <div className="bg-[#5b301f] px-6 py-5 flex justify-between items-center flex-shrink-0 rounded-t-[2rem]">
                            <div>
                                <h3 className="text-white font-black text-base">{editingQuoteId?'Editar Cotización':'Nueva Cotización'}</h3>
                                <p className="text-white/50 text-xs mt-0.5">{editingQuoteId?'Modifica los datos':'Completa el formulario'}</p>
                            </div>
                            <button onClick={()=>{setIsQuoteModalOpen(false);resetForm();}} className="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white hover:bg-white/25">
                                <Icon name="x" size={18}/>
                            </button>
                        </div>
                        <div className="flex-grow overflow-y-auto no-scrollbar p-5 space-y-4">
                            <div className="bg-white rounded-3xl p-5 shadow-sm">
                                <h4 className="text-xs font-black text-[#5b301f] uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="user" size={14}/> Cliente</h4>
                                <div className="space-y-3">
                                    <input className="w-full bg-stone-50 border border-stone-200 p-3 rounded-2xl text-sm transition-all" placeholder="Nombre completo o Razón Social *" value={clientName} onChange={e=>setClientName(e.target.value)}/>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input className="w-full bg-stone-50 border border-stone-200 p-3 rounded-2xl text-sm transition-all" placeholder="Teléfono" value={clientPhone} onChange={e=>setClientPhone(e.target.value)}/>
                                        <div className="relative">
                                            <input type="date" className="w-full bg-stone-50 border border-stone-200 p-3 rounded-2xl text-sm transition-all" value={dueDate} onChange={e=>setDueDate(e.target.value)}/>
                                            <label className="absolute -top-2 left-3 bg-white px-1 text-[9px] font-bold text-stone-400 uppercase">Vence</label>
                                        </div>
                                    </div>
                                    <input className="w-full bg-stone-50 border border-stone-200 p-3 rounded-2xl text-sm transition-all" placeholder="Dirección" value={clientAddress} onChange={e=>setClientAddress(e.target.value)}/>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl p-5 shadow-sm">
                                <h4 className="text-xs font-black text-[#5b301f] uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="package" size={14}/> Servicios / Productos</h4>
                                {items.length>0&&(
                                    <div className="space-y-2 mb-4">
                                        {items.map((item,i)=>(
                                            <div key={i} className="flex items-center gap-2 bg-stone-50 border border-stone-200 p-3 rounded-2xl">
                                                <div className="flex-grow min-w-0">
                                                    <div className="text-sm font-semibold text-stone-800 truncate">{item.desc}</div>
                                                    <div className="text-xs text-stone-400">{item.qty} × RD$ {Number(item.price).toLocaleString('en-US',{minimumFractionDigits:2})}</div>
                                                </div>
                                                <div className="font-black text-[#5b301f] text-sm flex-shrink-0">RD$ {(Number(item.qty)*Number(item.price)).toLocaleString('en-US',{minimumFractionDigits:0})}</div>
                                                <button onClick={()=>setItems(items.filter((_,j)=>j!==i))} className="text-stone-300 hover:text-rose-500 flex-shrink-0 ml-1"><Icon name="x" size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="bg-stone-50 border border-stone-200 rounded-2xl p-4 space-y-3">
                                    <input className="w-full bg-white border border-stone-200 p-3 rounded-xl text-sm transition-all" placeholder="Descripción del producto/servicio" value={newItem.desc} onChange={e=>setNewItem({...newItem,desc:e.target.value})}/>
                                    <div className="flex gap-2">
                                        <div className="w-1/3">
                                            <label className="text-[10px] font-bold text-stone-400 uppercase block mb-1">Cant.</label>
                                            <input type="number" min="1" className="w-full bg-white border border-stone-200 p-3 rounded-xl text-sm text-center transition-all" value={newItem.qty} onChange={e=>setNewItem({...newItem,qty:e.target.value})}/>
                                        </div>
                                        <div className="flex-grow">
                                            <label className="text-[10px] font-bold text-stone-400 uppercase block mb-1">Precio (RD$)</label>
                                            <input type="number" className="w-full bg-white border border-stone-200 p-3 rounded-xl text-sm text-right font-bold transition-all" placeholder="0.00" value={newItem.price} onChange={e=>setNewItem({...newItem,price:e.target.value})}/>
                                        </div>
                                    </div>
                                    <button onClick={()=>{ if(newItem.desc&&newItem.price!==''){setItems([...items,newItem]);setNewItem({desc:'',qty:1,price:''});}else showToast('Ingresa descripción y precio','error'); }}
                                        className="w-full bg-[#dfdbd0] text-[#5b301f] py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:brightness-95 transition-all">
                                        + Agregar
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl p-5 shadow-sm">
                                <h4 className="text-xs font-black text-[#5b301f] uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="message-square" size={14}/> Observaciones</h4>
                                <textarea className="w-full bg-stone-50 border border-stone-200 p-3 rounded-2xl text-sm transition-all resize-none" rows="2" placeholder="Notas adicionales..." value={observations} onChange={e=>setObservations(e.target.value)}/>
                            </div>
                        </div>

                        <div className="bg-white border-t border-stone-100 p-4 flex-shrink-0 shadow-lg">
                            <div className="flex flex-wrap gap-x-4 gap-y-2 mb-3 items-center">
                                <span className="text-xs font-bold text-stone-500">Sub: <span className="text-stone-700">RD$ {totals.sub.toLocaleString('en-US',{minimumFractionDigits:2})}</span></span>
                                <div className="flex items-center gap-1.5 text-xs font-bold text-stone-500">
                                    <span>Desc:</span>
                                    <div className="flex border border-stone-200 rounded-xl overflow-hidden bg-stone-50">
                                        <input type="number" min="0" className="w-14 p-1.5 text-right text-xs bg-transparent border-none" value={discountValue} onChange={e=>setDiscountValue(e.target.value)}/>
                                        <select className="bg-stone-100 border-l border-stone-200 p-1.5 text-xs" value={discountType} onChange={e=>setDiscountType(e.target.value)}>
                                            <option value="percentage">%</option><option value="fixed">RD$</option>
                                        </select>
                                    </div>
                                </div>
                                <label className="flex items-center gap-1.5 text-xs font-bold text-stone-500 cursor-pointer">
                                    <input type="checkbox" checked={applyTax} onChange={e=>setApplyTax(e.target.checked)} className="accent-[#5b301f] w-4 h-4 rounded"/>
                                    ITBIS {applyTax&&<input type="number" className="w-10 text-center border border-stone-200 rounded-lg p-1 text-xs bg-stone-50" value={tax} onChange={e=>setTax(Number(e.target.value))}/>}%
                                </label>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex-grow">
                                    <div className="text-[9px] font-black uppercase text-stone-400 tracking-widest">Total Neto</div>
                                    <div className="text-2xl font-black text-[#5b301f]">RD$ {totals.total.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
                                </div>
                                <button onClick={handleSaveQuote} className="bg-[#5b301f] text-white px-6 py-3.5 rounded-2xl font-black text-sm shadow-lg hover:brightness-110 transition-all">
                                    {editingQuoteId?'Actualizar':'Guardar'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ── MODAL AJUSTES ── */}
            {isSettingsModalOpen && (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-end justify-center md:items-center">
                    <div className="bg-[#f0ede8] rounded-t-[2rem] shadow-2xl w-full max-w-lg flex flex-col h-[96vh] overflow-hidden slide-up md:rounded-[2rem] md:h-[90vh] md:max-w-2xl">
                        <div className="bg-[#5b301f] px-6 py-5 flex justify-between items-center flex-shrink-0 rounded-t-[2rem]">
                            <h3 className="text-white font-black text-base">Ajustes</h3>
                            <button onClick={()=>setIsSettingsModalOpen(false)} className="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center text-white"><Icon name="x" size={18}/></button>
                        </div>
                        <div className="flex-grow overflow-y-auto no-scrollbar p-5 space-y-4">
                            <div className="bg-white rounded-3xl p-5 shadow-sm space-y-4">
                                <h4 className="text-xs font-black text-[#5b301f] uppercase tracking-widest flex items-center gap-2"><Icon name="building-2" size={14}/> Empresa</h4>
                                <div>
                                    <label className="text-xs font-bold text-stone-500 block mb-2">Logo (PNG/JPG)</label>
                                    <div className="flex items-center gap-3">
                                        {settings.logo&&<img src={settings.logo} alt="Logo" className="h-12 w-auto object-contain bg-stone-50 border p-1 rounded-xl"/>}
                                        <div className="flex-grow relative">
                                            <input type="file" accept="image/png,image/jpeg" disabled={uploadingLogo}
                                                className="w-full bg-stone-50 border border-stone-200 rounded-2xl p-2.5 text-xs file:mr-3 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-[#dfdbd0] file:text-[#5b301f] cursor-pointer disabled:opacity-50"
                                                onChange={handleLogoUpload}/>
                                            {uploadingLogo&&<div className="absolute inset-0 bg-white/80 rounded-2xl flex items-center justify-center gap-2 text-xs font-bold text-[#5b301f]"><div className="w-4 h-4 border-2 border-[#5b301f] border-t-transparent rounded-full animate-spin"></div>Subiendo...</div>}
                                        </div>
                                        {settings.logo&&<button onClick={()=>setSettings(p=>({...p,logo:null}))} className="text-stone-300 hover:text-rose-500"><Icon name="trash-2" size={16}/></button>}
                                    </div>
                                    {settings.logo?.startsWith('http')&&<p className="text-[10px] text-emerald-600 font-bold mt-1.5 flex items-center gap-1"><Icon name="cloud" size={11}/> Guardado en la nube</p>}
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div><label className="text-xs font-bold text-stone-500 block mb-1">Empresa</label><input className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all" value={settings.companyName} onChange={e=>setSettings(p=>({...p,companyName:e.target.value}))}/></div>
                                    <div><label className="text-xs font-bold text-stone-500 block mb-1">RNC</label><input className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all" value={settings.rnc} onChange={e=>setSettings(p=>({...p,rnc:e.target.value}))}/></div>
                                </div>
                                <div><label className="text-xs font-bold text-stone-500 block mb-1">Dirección</label><input className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all" value={settings.address} onChange={e=>setSettings(p=>({...p,address:e.target.value}))}/></div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div><label className="text-xs font-bold text-stone-500 block mb-1">Teléfono</label><input className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all" value={settings.phone} onChange={e=>setSettings(p=>({...p,phone:e.target.value}))}/></div>
                                    <div><label className="text-xs font-bold text-stone-500 block mb-1">Email</label><input className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all" value={settings.email} onChange={e=>setSettings(p=>({...p,email:e.target.value}))}/></div>
                                </div>
                                <div><label className="text-xs font-bold text-stone-500 block mb-1">Info Bancaria</label><textarea className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all h-20 resize-none" value={settings.bankInfo} onChange={e=>setSettings(p=>({...p,bankInfo:e.target.value}))}/></div>
                                <div><label className="text-xs font-bold text-stone-500 block mb-1">Términos y Condiciones</label><textarea className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all h-20 resize-none" value={settings.terms} onChange={e=>setSettings(p=>({...p,terms:e.target.value}))}/></div>
                                <div><label className="text-xs font-bold text-stone-500 block mb-1">Nombre del Emisor</label><input className="w-full bg-stone-50 border border-stone-200 p-2.5 rounded-2xl text-sm transition-all" value={settings.creatorName} onChange={e=>setSettings(p=>({...p,creatorName:e.target.value}))}/></div>
                            </div>
                        </div>
                        <div className="p-5 bg-white border-t border-stone-100 flex-shrink-0">
                            <button onClick={handleSaveSettings} disabled={savingSettings}
                                className="w-full bg-[#5b301f] text-white py-4 rounded-2xl font-black text-sm shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2 disabled:opacity-70">
                                {savingSettings?<><div className="loader-white"></div>Guardando...</>:<><Icon name="save" size={16}/>Guardar Configuración</>}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── PDF PREVIEW ── */}
            {isPDFPreviewOpen&&pdfPreviewDataUrl&&(
                <div className="fixed inset-0 bg-stone-900/95 z-[100] flex flex-col fade-in">
                    <div className="flex items-center justify-between px-4 py-3 bg-stone-900 flex-shrink-0">
                        <div><div className="font-black text-white text-sm">{pdfPreviewQuote?.quoteId}</div><div className="text-stone-400 text-xs">{pdfPreviewQuote?.clientName}</div></div>
                        <div className="flex items-center gap-2">
                            <button onClick={downloadFromPreview} className="flex items-center gap-1.5 bg-[#5b301f] text-white px-4 py-2 rounded-xl font-bold text-xs hover:brightness-110"><Icon name="download" size={14}/> Descargar</button>
                            <button onClick={shareFromPreview} className="flex items-center gap-1.5 bg-emerald-700 text-white px-4 py-2 rounded-xl font-bold text-xs hover:brightness-110"><Icon name="share-2" size={14}/> Compartir</button>
                            <button onClick={()=>{setIsPDFPreviewOpen(false);setPdfPreviewDataUrl(null);setPdfPreviewQuote(null);}} className="w-9 h-9 rounded-xl bg-stone-700 flex items-center justify-center text-stone-400 hover:text-white ml-1"><Icon name="x" size={18}/></button>
                        </div>
                    </div>
                    <div className="flex-grow overflow-auto flex items-start justify-center p-4 bg-stone-800">
                        <img src={pdfPreviewDataUrl} alt="Vista previa" className="w-full shadow-2xl rounded" style={{maxWidth:'794px'}}/>
                    </div>
                </div>
            )}

            {/* PDF hidden template */}
            {currentQuotePDF&&(
                <div id="pdf-render-container">
                    <div id="pdf-template" className="relative w-full h-full bg-white overflow-hidden text-[#5b301f] pdf-font-sans flex flex-col p-[50px]">
                        <svg className="absolute top-0 right-0 w-[400px] h-[400px] opacity-80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#dfdbd0" d="M51.9,-61.8C65.6,-50.2,74,-31.6,76.5,-12.3C79.1,7,75.8,26.9,64.2,41.9C52.5,56.8,32.4,66.8,11.5,70.5C-9.5,74.2,-31.4,71.5,-47.5,59.9C-63.5,48.2,-73.7,27.5,-75.6,6.3C-77.5,-14.9,-71.2,-36.5,-56.9,-48.7C-42.6,-61,-21.3,-64,-0.4,-63.5C20.4,-63,40.8,-59,51.9,-61.8Z" transform="translate(140 60) scale(1.1)"/>
                        </svg>
                        <div className="relative z-10 flex-grow flex flex-col">
                            <div className="flex justify-between items-start mb-16">
                                <div className="w-1/2">
                                    <div className="flex items-center gap-2 mb-4">
                                        {settings.logo?<img src={settings.logo} alt="Logo" className="max-w-[300px] max-h-[120px] object-contain"/>:<div className="w-10 h-10 rounded-full border border-[#5b301f] flex items-center justify-center pdf-font-serif text-2xl">{settings.companyName.charAt(0)}</div>}
                                    </div>
                                    <div className="text-sm space-y-1 mt-6">
                                        <div className="font-bold uppercase tracking-widest text-[14px] mb-2">DATOS DEL CLIENTE:</div>
                                        <div className="font-bold text-base">{currentQuotePDF.clientName}</div>
                                        <div>{currentQuotePDF.clientAddress}</div>
                                        <div>{currentQuotePDF.clientPhone}</div>
                                    </div>
                                </div>
                                <div className="w-1/2 text-right">
                                    <h1 className="pdf-font-serif text-5xl font-bold tracking-widest text-[#5b301f] mb-8">COTIZACIÓN</h1>
                                    <div className="text-sm font-bold tracking-widest uppercase mb-1">Cotización: {currentQuotePDF.quoteId}</div>
                                    <div className="text-sm font-bold tracking-widest uppercase">Fecha: {currentQuotePDF.dateStr}</div>
                                    {currentQuotePDF.dueDate&&<div className="text-sm font-bold tracking-widest uppercase text-rose-800 mt-1">Vencimiento: {new Date(currentQuotePDF.dueDate).toLocaleDateString('es-DO')}</div>}
                                </div>
                            </div>
                            <div className="mb-8 flex-grow">
                                <table className="w-full text-sm">
                                    <thead><tr className="bg-[#dfdbd0] text-[#5b301f] uppercase tracking-widest text-[11px]">
                                        <th className="py-3 px-4 text-left font-bold">Descripción</th>
                                        <th className="py-3 px-4 text-center font-bold">Cant.</th>
                                        <th className="py-3 px-4 text-right font-bold">Precio</th>
                                        <th className="py-3 px-4 text-right font-bold">Total</th>
                                    </tr></thead>
                                    <tbody>{currentQuotePDF.items.map((item,i)=>(
                                        <tr key={i} className="border-b border-[#dfdbd0]">
                                            <td className="py-4 px-4">{item.desc}</td>
                                            <td className="py-4 px-4 text-center">{item.qty}</td>
                                            <td className="py-4 px-4 text-right">RD$ {Number(item.price).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
                                            <td className="py-4 px-4 text-right font-bold">RD$ {(Number(item.qty)*Number(item.price)).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
                                        </tr>
                                    ))}</tbody>
                                </table>
                                <div className="flex justify-end mt-6">
                                    <div className="w-1/3 space-y-3 text-sm">
                                        <div className="flex justify-between font-bold uppercase tracking-widest text-[10px]"><span>Sub Total</span><span>RD$ {currentQuotePDF.subtotal.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
                                        {currentQuotePDF.discountAmount>0&&<div className="flex justify-between font-bold uppercase tracking-widest text-[10px] text-rose-800"><span>Descuento</span><span>- RD$ {currentQuotePDF.discountAmount.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>}
                                        {currentQuotePDF.applyTax!==false&&<div className="flex justify-between font-bold uppercase tracking-widest text-[10px]"><span>ITBIS ({currentQuotePDF.taxRate}%)</span><span>RD$ {currentQuotePDF.taxAmount.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>}
                                        <div className="flex justify-between font-black uppercase tracking-widest text-base pt-3 border-t border-[#dfdbd0]"><span>Total</span><span>RD$ {currentQuotePDF.total.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-auto border-t border-[#dfdbd0] pt-6 grid grid-cols-3 gap-6 text-[10px] leading-relaxed">
                                <div>
                                    <div className="font-bold uppercase tracking-widest mb-2 text-[#5b301f]">Info de Pago</div>
                                    <div className="whitespace-pre-line text-stone-600 mb-4">{settings.bankInfo}</div>
                                    <div className="font-bold uppercase tracking-widest mt-4 mb-2 text-[#5b301f]">{settings.companyName}</div>
                                    <div className="text-stone-600">{settings.address}</div>
                                    <div className="text-stone-600">{settings.phone}</div>
                                    <div className="text-stone-600">{settings.email}</div>
                                </div>
                                <div>
                                    <div className="font-bold uppercase tracking-widest mb-2 text-[#5b301f]">Condiciones</div>
                                    <div className="whitespace-pre-line text-stone-600 mb-4">{settings.terms}</div>
                                    {currentQuotePDF.observations&&<><div className="font-bold uppercase tracking-widest mt-4 mb-2 text-[#5b301f]">Notas Extra</div><div className="text-stone-600 italic">{currentQuotePDF.observations}</div></>}
                                </div>
                                <div className="flex flex-col items-center justify-end pb-4">
                                    <div className="w-40 border-b border-[#5b301f] mb-2 text-center">
                                        <span className="font-['Playfair_Display'] italic text-2xl text-stone-700 select-none block pb-1">{settings.creatorName}</span>
                                    </div>
                                    <div className="font-bold uppercase tracking-widest text-[#5b301f] text-center">{settings.creatorName}</div>
                                    <div className="text-stone-500 uppercase text-[8px] tracking-widest text-center">Firma Autorizada</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

/* ── ROOT ─────────────────────────────────────────────── */
function Root() {
    const [session, setSession] = useState(null);
    const [checking, setChecking] = useState(true);

    useEffect(()=>{
        (async()=>{
            try {
                const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
                const {data:{session:s}}=await client.auth.getSession();
                if(s?.user){
                    const isAdmin=s.user.email===ADMIN_EMAIL;
                    setSession({supabase:client,user:s.user,isAdmin,displayName:isAdmin?'Admin':'KTorres'});
                }
            } catch(e){console.error(e);}
            finally{setChecking(false);}
        })();
    },[]);

    const handleLogin=(client,user,isAdmin,displayName)=>setSession({supabase:client,user,isAdmin,displayName});
    const handleLogout=async()=>{ if(session?.supabase) await session.supabase.auth.signOut(); setSession(null); };

    if(checking) return(
        <div className="h-screen flex items-center justify-center bg-[#5b301f]">
            <div className="loader" style={{borderColor:'rgba(255,255,255,0.2)',borderTopColor:'white'}}></div>
        </div>
    );

    if(!session) return <LoginScreen onLogin={handleLogin}/>;
    return <MainApp {...session} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
