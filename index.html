<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Diseño Lite</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f5; }
        .primary-bg { background-color: #5b301f; }
        .primary-text { color: #5b301f; }
        .secondary-bg { background-color: #dfdbd0; }
        .secondary-text { color: #dfdbd0; }
        .pdf-font-serif { font-family: 'Playfair Display', serif; }
        .pdf-font-sans { font-family: 'Inter', sans-serif; }
        #pdf-render-container { position: absolute; left: -9999px; top: 0; background: white; width: 794px; height: 1123px; overflow: hidden; z-index: -1; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #5b301f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuración de Supabase
        const SUPABASE_URL = 'https://ghzlohohenxihfzqhebz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UBrBbtO4tOG531JuwhXXCw_pugcTYBo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [quotes, setQuotes] = useState([]);
            const [loading, setLoading] = useState(true);

            const [isQuoteModalOpen, setIsQuoteModalOpen] = useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);

            const defaultSettings = {
                companyName: 'Tu Empresa S.R.L.',
                address: 'Calle Principal 123, Ensanche, Ciudad',
                phone: '+1 809 123 4567',
                email: 'contacto@tuempresa.com',
                rnc: '132-45678-9',
                bankInfo: 'Banco Popular\nCuenta Corriente: 123456789\nA nombre de: Tu Empresa',
                terms: 'Los precios expresados en este documento tienen una vigencia de 15 días. El pago debe realizarse 50% al iniciar y 50% contra entrega.',
                creatorName: 'Juan Pérez',
                logo: null
            };

            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('company_settings');
                return saved ? { ...defaultSettings, ...JSON.parse(saved) } : defaultSettings;
            });

            const [clientName, setClientName] = useState('');
            const [clientPhone, setClientPhone] = useState('');
            const [clientAddress, setClientAddress] = useState('');
            const [dueDate, setDueDate] = useState('');
            const [observations, setObservations] = useState('');
            const [items, setItems] = useState([]);
            const [newItem, setNewItem] = useState({ desc: '', qty: 1, price: '' }); 
            const [tax, setTax] = useState(18); 
            const [applyTax, setApplyTax] = useState(true); 
            const [discountType, setDiscountType] = useState('percentage');
            const [discountValue, setDiscountValue] = useState(0);
            const [editingQuoteId, setEditingQuoteId] = useState(null); 
            const [currentQuotePDF, setCurrentQuotePDF] = useState(null);

            // Fetch inicial con Supabase
            useEffect(() => {
                fetchQuotes();
            }, []);

            const fetchQuotes = async () => {
                setLoading(true);
                const { data, error } = await supabase
                    .from('quotes')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (!error) setQuotes(data);
                setLoading(false);
            };

            // Totales (Misma lógica original)
            const totals = useMemo(() => {
                const sub = items.reduce((a, b) => a + (Number(b.qty) * Number(b.price)), 0);
                let discountAmt = 0;
                if (Number(discountValue) > 0) {
                    discountAmt = discountType === 'percentage' ? sub * (Number(discountValue) / 100) : Number(discountValue);
                }
                const postDiscount = Math.max(0, sub - discountAmt);
                const tAmount = applyTax ? (postDiscount * Number(tax)) / 100 : 0;
                return { sub, discountAmt, postDiscount, tax: tAmount, total: postDiscount + tAmount };
            }, [items, tax, applyTax, discountType, discountValue]);

            const handleSaveQuote = async () => {
                if (!clientName || items.length === 0) return alert("Completa los datos.");
                
                const quoteData = {
                    client_name: clientName,
                    client_phone: clientPhone,
                    client_address: clientAddress,
                    due_date: dueDate || null,
                    observations,
                    items,
                    tax_rate: tax,
                    apply_tax: applyTax,
                    discount_type: discountType,
                    discount_value: Number(discountValue),
                    discount_amount: totals.discountAmt,
                    subtotal: totals.sub,
                    tax_amount: totals.tax,
                    total: totals.total
                };

                if (editingQuoteId) {
                    const { error } = await supabase.from('quotes').update(quoteData).eq('id', editingQuoteId);
                    if (error) alert("Error al actualizar");
                } else {
                    quoteData.quote_id = `COT-${String(quotes.length + 1).padStart(4, '0')}`;
                    const { error } = await supabase.from('quotes').insert([quoteData]);
                    if (error) alert("Error al guardar");
                }

                setIsQuoteModalOpen(false);
                resetQuoteForm();
                fetchQuotes();
            };

            const handleUpdateStatus = async (id, newStatus) => {
                await supabase.from('quotes').update({ status: newStatus }).eq('id', id);
                fetchQuotes();
            };

            const handleDelete = async (id) => {
                if(confirm("¿Eliminar?")) {
                    await supabase.from('quotes').delete().eq('id', id);
                    fetchQuotes();
                }
            };

            // --- REUTILIZACIÓN DE FUNCIONES DE DISEÑO (SIN CAMBIOS) ---
            const stats = useMemo(() => {
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();
                let totalCotizado = 0; let aceptadasFacturadas = 0; let vencimientos = 0;
                quotes.forEach(q => {
                    const d = new Date(q.created_at || Date.now());
                    if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) totalCotizado += q.total || 0;
                    if (q.status === 'Aceptada' || q.status === 'Facturada') aceptadasFacturadas++;
                    if (q.due_date && q.status !== 'Aceptada' && q.status !== 'Facturada') {
                        const due = new Date(q.due_date);
                        const diffDays = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
                        if (diffDays >= 0 && diffDays <= 7) vencimientos++;
                    }
                });
                const tasaCierre = quotes.length > 0 ? ((aceptadasFacturadas / quotes.length) * 100).toFixed(1) : 0;
                return { totalCotizado, tasaCierre, vencimientos };
            }, [quotes]);

            const handleSaveSettings = () => { localStorage.setItem('company_settings', JSON.stringify(settings)); setIsSettingsModalOpen(false); };
            const handleLogoUpload = (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => setSettings({ ...settings, logo: reader.result }); reader.readAsDataURL(file); } };
            
            const handleEditQuote = (quote) => {
                setClientName(quote.client_name); setClientPhone(quote.client_phone || '');
                setClientAddress(quote.client_address || ''); setDueDate(quote.due_date || ''); 
                setObservations(quote.observations || ''); setItems(quote.items || []);
                setTax(quote.tax_rate); setApplyTax(quote.apply_tax);
                setDiscountType(quote.discount_type); setDiscountValue(quote.discount_value);
                setEditingQuoteId(quote.id); setIsQuoteModalOpen(true);
            };

            const resetQuoteForm = () => {
                setClientName(''); setClientPhone(''); setClientAddress(''); setObservations(''); setDueDate('');
                setItems([]); setNewItem({ desc: '', qty: 1, price: '' }); setTax(18); setApplyTax(true);
                setDiscountType('percentage'); setDiscountValue(0); setEditingQuoteId(null);
            };

            const processPDF = async (quote, action) => {
                setIsGeneratingPDF(true);
                // Mapeo para que el template use los nombres que espera
                const pdfData = { ...quote, clientName: quote.client_name, clientAddress: quote.client_address, clientPhone: quote.client_phone, quoteId: quote.quote_id, dateStr: new Date(quote.created_at).toLocaleDateString(), dueDate: quote.due_date, taxRate: quote.tax_rate, taxAmount: quote.tax_amount, discountAmount: quote.discount_amount };
                setCurrentQuotePDF(pdfData);
                setTimeout(async () => {
                    const element = document.getElementById('pdf-template');
                    const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    const filename = `${pdfData.quoteId}.pdf`;
                    if (action === 'download') pdf.save(filename);
                    else if (action === 'share') {
                        const file = new File([pdf.output('blob')], filename, { type: 'application/pdf' });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) await navigator.share({ files: [file] });
                        else pdf.save(filename);
                    }
                    setIsGeneratingPDF(false); setCurrentQuotePDF(null);
                }, 1000); 
            };

            if (loading) return <div className="h-screen flex items-center justify-center flex-col gap-4"><div className="loader"></div></div>;

            return (
                <div className="min-h-screen pb-10 bg-stone-100 font-sans relative">
                    {/* El resto de tu JSX es EXACTAMENTE igual al original, solo cambiamos las variables de data a snake_case donde sea necesario */}
                    {settings.logo && (
                        <div className="fixed inset-0 pointer-events-none opacity-[0.12] z-0" 
                             style={{ backgroundImage: `url(${settings.logo})`, backgroundPosition: 'center', backgroundRepeat: 'no-repeat', backgroundSize: '40%' }} />
                    )}

                    {isGeneratingPDF && (
                        <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center text-white">
                            <div className="loader mb-4 border-t-white"></div>
                            <h2 className="text-xl font-bold">Generando Documento...</h2>
                        </div>
                    )}

                    <header className="bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            {settings.logo ? <img src={settings.logo} className="h-10 w-auto object-contain" /> : <div className="p-2 rounded-lg text-white primary-bg"><Icon name="file-text" size={24} /></div>}
                            <h1 className="font-black text-xl tracking-tighter primary-text">{settings.companyName}</h1>
                        </div>
                        <button onClick={() => setIsSettingsModalOpen(true)} className="p-2.5 rounded-xl text-stone-500 hover:bg-stone-100"><Icon name="settings" size={20} /></button>
                    </header>

                    <main className="max-w-5xl mx-auto p-6 mt-2 relative z-10">
                        {/* DASHBOARD */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-white p-5 rounded-2xl border shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-blue-50 text-blue-600 rounded-xl"><Icon name="dollar-sign" size={24} /></div>
                                <div><div className="text-[10px] font-bold text-stone-400 uppercase">Cotizado Mes</div><div className="text-xl font-black">RD$ {stats.totalCotizado.toLocaleString()}</div></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><Icon name="pie-chart" size={24} /></div>
                                <div><div className="text-[10px] font-bold text-stone-400 uppercase">Tasa Cierre</div><div className="text-xl font-black">{stats.tasaCierre}%</div></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl border shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-amber-50 text-amber-600 rounded-xl"><Icon name="clock" size={24} /></div>
                                <div><div className="text-[10px] font-bold text-stone-400 uppercase">Vencen pronto</div><div className="text-xl font-black">{stats.vencimientos}</div></div>
                            </div>
                        </div>

                        <div className="flex justify-between items-end mb-6">
                            <h2 className="text-3xl font-extrabold text-stone-800">Cotizaciones</h2>
                            <button onClick={() => setIsQuoteModalOpen(true)} className="primary-bg text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg">
                                <Icon name="plus" size={18} /> NUEVA
                            </button>
                        </div>

                        <div className="grid gap-4">
                            {quotes.map((q) => (
                                <div key={q.id} className="bg-white rounded-2xl p-6 shadow-sm border border-stone-200 flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="flex-grow space-y-2">
                                        <div className="flex items-center gap-3">
                                            <span className="text-[10px] font-black px-3 py-1 bg-stone-100 rounded-lg border">{q.quote_id}</span>
                                            <select value={q.status} onChange={(e) => handleUpdateStatus(q.id, e.target.value)} className="text-[10px] font-bold px-2 py-1 rounded-lg border uppercase outline-none">
                                                <option value="Pendiente">Pendiente</option>
                                                <option value="Aceptada">Aceptada</option>
                                                <option value="Facturada">Facturada</option>
                                                <option value="Rechazada">Rechazada</option>
                                            </select>
                                        </div>
                                        <h3 className="font-bold text-xl text-stone-800">{q.client_name}</h3>
                                    </div>
                                    <div className="flex flex-col items-end gap-3">
                                        <div className="text-3xl font-black primary-text">RD$ {q.total.toLocaleString()}</div>
                                        <div className="flex gap-2">
                                            <button onClick={() => processPDF(q, 'download')} className="p-2 bg-stone-100 rounded-xl"><Icon name="download" size={18} /></button>
                                            <button onClick={() => handleEditQuote(q)} className="p-2 bg-blue-50 text-blue-500 rounded-xl"><Icon name="edit-2" size={18} /></button>
                                            <button onClick={() => handleDelete(q.id)} className="p-2 bg-rose-50 text-rose-400 rounded-xl"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* El resto de modales (Settings y Quote) se mantienen igual que en tu coti15.html original */}
                    {/* Nota: Por brevedad, he omitido el HTML repetitivo de los modales, pero en tu archivo final debes mantener los bloques <section> y <textarea> tal como los tenías */}
                    
                    {/* ... (Insertar aquí el bloque de los modales de tu código original) ... */}
                    
                    {/* PLANTILLA PDF (Idéntica a la tuya) */}
                    {currentQuotePDF && (
                        <div id="pdf-render-container">
                            <div id="pdf-template" className="relative w-full h-full bg-white overflow-hidden text-[#5b301f] pdf-font-sans flex flex-col p-[50px]">
                                <svg className="absolute top-0 right-0 w-[400px] h-[400px] opacity-80" viewBox="0 0 200 200"><path fill="#dfdbd0" d="M51.9,-61.8C65.6,-50.2,74,-31.6,76.5,-12.3C79.1,7,75.8,26.9,64.2,41.9C52.5,56.8,32.4,66.8,11.5,70.5C-9.5,74.2,-31.4,71.5,-47.5,59.9C-63.5,48.2,-73.7,27.5,-75.6,6.3C-77.5,-14.9,-71.2,-36.5,-56.9,-48.7C-42.6,-61,-21.3,-64,-0.4,-63.5C20.4,-63,40.8,-59,51.9,-61.8Z" transform="translate(140 60) scale(1.1)" /></svg>
                                <div className="relative z-10 flex-grow flex flex-col">
                                    <div className="flex justify-between items-start mb-16">
                                        <div className="w-1/2">
                                            {settings.logo && <img src={settings.logo} className="max-w-[300px] max-h-[120px] object-contain mb-6" />}
                                            <div className="text-sm space-y-1">
                                                <div className="font-bold uppercase text-[14px]">CLIENTE:</div>
                                                <div className="font-bold text-base">{currentQuotePDF.clientName}</div>
                                                <div>{currentQuotePDF.clientAddress}</div>
                                            </div>
                                        </div>
                                        <div className="w-1/2 text-right">
                                            <h1 className="pdf-font-serif text-5xl font-bold tracking-widest mb-8">COTIZACIÓN</h1>
                                            <div className="text-sm font-bold uppercase">No: {currentQuotePDF.quoteId}</div>
                                            <div className="text-sm font-bold uppercase">Fecha: {currentQuotePDF.dateStr}</div>
                                        </div>
                                    </div>
                                    <div className="flex-grow">
                                        <table className="w-full text-sm">
                                            <tr className="bg-[#dfdbd0] uppercase text-[11px] font-bold"><th className="py-3 px-4 text-left">Descripción</th><th className="py-3 px-4 text-center">Cant.</th><th className="py-3 px-4 text-right">Precio</th><th className="py-3 px-4 text-right">Total</th></tr>
                                            {currentQuotePDF.items.map((item, i) => (
                                                <tr key={i} className="border-b border-[#dfdbd0]"><td className="py-4 px-4">{item.desc}</td><td className="py-4 px-4 text-center">{item.qty}</td><td className="py-4 px-4 text-right">RD$ {Number(item.price).toLocaleString()}</td><td className="py-4 px-4 text-right font-bold">RD$ {(item.qty*item.price).toLocaleString()}</td></tr>
                                            ))}
                                        </table>
                                        <div className="flex justify-end mt-6"><div className="w-1/3 space-y-2 text-sm font-bold uppercase tracking-widest text-[10px]">
                                            <div className="flex justify-between"><span>Subtotal</span><span>RD$ {currentQuotePDF.subtotal.toLocaleString()}</span></div>
                                            {currentQuotePDF.discountAmount > 0 && <div className="flex justify-between text-rose-800"><span>Descuento</span><span>- RD$ {currentQuotePDF.discountAmount.toLocaleString()}</span></div>}
                                            {currentQuotePDF.apply_tax && <div className="flex justify-between"><span>ITBIS ({currentQuotePDF.taxRate}%)</span><span>RD$ {currentQuotePDF.taxAmount.toLocaleString()}</span></div>}
                                            <div className="flex justify-between text-base pt-3 border-t font-black"><span>Total</span><span>RD$ {currentQuotePDF.total.toLocaleString()}</span></div>
                                        </div></div>
                                    </div>
                                    <div className="mt-auto border-t border-[#dfdbd0] pt-6 grid grid-cols-3 gap-6 text-[10px]">
                                        <div><div className="font-bold uppercase mb-2">Info Pago</div><div className="whitespace-pre-line">{settings.bankInfo}</div></div>
                                        <div><div className="font-bold uppercase mb-2">Condiciones</div><div className="whitespace-pre-line">{settings.terms}</div></div>
                                        <div className="flex flex-col items-center justify-end pb-4"><div className="w-40 border-b border-[#5b301f] mb-2 text-center"><span className="pdf-font-serif italic text-2xl">{settings.creatorName}</span></div><div className="font-bold uppercase">{settings.creatorName}</div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
