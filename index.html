<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cotizador - Supabase</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useMemo } = React;

function App(){

const [db,setDb]=useState(null);
const [quotes,setQuotes]=useState([]);
const [loading,setLoading]=useState(true);
const [isDemo,setIsDemo]=useState(false);

const [clientName,setClientName]=useState("");
const [items,setItems]=useState([]);
const [editingQuoteId,setEditingQuoteId]=useState(null);

const [newItem,setNewItem]=useState({desc:"",qty:1,price:""});

const totals = useMemo(()=>{
    const sub = items.reduce((a,b)=>a+(b.qty*b.price),0);
    return {sub,total:sub};
},[items]);

// 🔥 INIT SUPABASE
useEffect(()=>{
const init = async()=>{
try{
const supabaseUrl="https://ghzlohohenxihfzqhebz.supabase.co";
const supabaseKey="sb_publishable_UBrBbtO4tOG531JuwhXXCw_pugcTYBo";

const supabase = window.supabase.createClient(supabaseUrl,supabaseKey);

setDb(supabase);

}catch(e){
console.error(e);
setIsDemo(true);
setQuotes(JSON.parse(localStorage.getItem("demo_quotes")||"[]"));
}finally{
setLoading(false);
}
};
init();
},[]);

// 🔥 GET DATA
useEffect(()=>{
if(!db||isDemo)return;

const fetchData=async()=>{
const {data,error}=await db.from("quotes").select("*").order("createdAt",{ascending:false});

if(error){
console.error(error);
setIsDemo(true);
}else{
setQuotes(data);
}
};

fetchData();
},[db,isDemo]);

// 🔥 SAVE
const handleSave = async()=>{
if(!clientName||items.length===0)return alert("Completa datos");

const quoteData={
clientName,
items,
total:totals.total,
createdAt:Date.now()
};

if(editingQuoteId){

if(isDemo){
const updated=quotes.map(q=>q.id===editingQuoteId?{...q,...quoteData}:q);
setQuotes(updated);
localStorage.setItem("demo_quotes",JSON.stringify(updated));
}else{
await db.from("quotes").update(quoteData).eq("id",editingQuoteId);
}

}else{

if(isDemo){
const newQ={...quoteData,id:Date.now().toString()};
const updated=[newQ,...quotes];
setQuotes(updated);
localStorage.setItem("demo_quotes",JSON.stringify(updated));
}else{
await db.from("quotes").insert([quoteData]);
}
}

setClientName("");
setItems([]);
setEditingQuoteId(null);
};

// 🔥 DELETE
const handleDelete = async(id)=>{

if(isDemo){
const filtered=quotes.filter(q=>q.id!==id);
setQuotes(filtered);
localStorage.setItem("demo_quotes",JSON.stringify(filtered));
}else{
await db.from("quotes").delete().eq("id",id);
setQuotes(quotes.filter(q=>q.id!==id));
}

};

// 🔥 UI
if(loading) return <div>Cargando...</div>;

return(
<div className="p-6">

<h1 className="text-2xl font-bold mb-4">Cotizador</h1>

<input
placeholder="Cliente"
className="border p-2 mb-2 w-full"
value={clientName}
onChange={e=>setClientName(e.target.value)}
/>

<div className="flex gap-2 mb-4">
<input placeholder="Desc"
value={newItem.desc}
onChange={e=>setNewItem({...newItem,desc:e.target.value})}
/>
<input type="number"
value={newItem.qty}
onChange={e=>setNewItem({...newItem,qty:e.target.value})}
/>
<input type="number"
value={newItem.price}
onChange={e=>setNewItem({...newItem,price:e.target.value})}
/>

<button onClick={()=>{
setItems([...items,newItem]);
setNewItem({desc:"",qty:1,price:""});
}}>+</button>
</div>

<button onClick={handleSave} className="bg-black text-white p-2">
Guardar
</button>

<hr className="my-6"/>

{quotes.map(q=>(
<div key={q.id} className="border p-3 mb-2">

<h3>{q.clientName}</h3>
<p>Total: {q.total}</p>

<button onClick={()=>handleDelete(q.id)}>Eliminar</button>

</div>
))}

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
